services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - bank-network

  kafka-broker-1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker-1
    depends_on:
      - zookeeper
    ports:
      - "9091:9091"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:9091
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
    networks:
      - bank-network

  kafka-broker-2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker-2
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
    networks:
      - bank-network

  kafka-broker-3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker-3
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-3:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
    networks:
      - bank-network

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init
    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3
    command: >
      bash -c "
        sleep 60 &&
        /usr/bin/kafka-topics --delete --topic bank-transactions --bootstrap-server kafka-broker-1:9091 --if-exists || true &&
        /usr/bin/kafka-topics --create --topic bank-transactions \
          --partitions 3 \
          --replication-factor 3 \
          --config min.insync.replicas=2 \
          --config retention.ms=300000 \
          --config cleanup.policy=delete \
          --bootstrap-server kafka-broker-1:9091
      "
    networks:
      - bank-network

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_DB: bank_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bank-network

  producer:
    build: .
    container_name: producer
    depends_on:
      - postgres
      - kafka-init
    environment:
      APP_ROLE: producer
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker-1:9091,kafka-broker-2:9092,kafka-broker-3:9093
    command: ["java", "-Dspring.profiles.active=producer", "-jar", "app.jar"]
    networks:
      - bank-network

  consumer-1:
    build: .
    container_name: consumer-1
    depends_on:
      - postgres
      - kafka-init
    environment:
      APP_ROLE: consumer
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker-1:9091,kafka-broker-2:9092,kafka-broker-3:9093
      KAFKA_CONSUMER_GROUP: bank-processors
    command: ["java", "-Dspring.profiles.active=consumer", "-jar", "app.jar"]
    networks:
      - bank-network

  consumer-2:
    build: .
    container_name: consumer-2
    depends_on:
      - postgres
      - kafka-init
    environment:
      APP_ROLE: consumer
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker-1:9091,kafka-broker-2:9092,kafka-broker-3:9093
      KAFKA_CONSUMER_GROUP: bank-processors
    command: ["java", "-Dspring.profiles.active=consumer", "-jar", "app.jar"]
    networks:
      - bank-network

  consumer-3:
    build: .
    container_name: consumer-3
    depends_on:
      - postgres
      - kafka-init
    environment:
      APP_ROLE: consumer
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker-1:9091,kafka-broker-2:9092,kafka-broker-3:9093
      KAFKA_CONSUMER_GROUP: bank-processors
    command: ["java", "-Dspring.profiles.active=consumer", "-jar", "app.jar"]
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge